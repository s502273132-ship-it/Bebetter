<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeBetter · 代換份加總表</title>
<style>
  :root{
    --paper:#FAF6EC; --card:#FFFDF8; --ink:#2E2A22; --muted:#8A8368;
    --olive:#6E7A4F; --olive-deep:#55603C; --clay:#C1803A; --clay-soft:#F0E2CB;
    --line:#E7DECB; --green:#5E7A3C; --green-bg:#EEF2E1;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    margin:0;background:var(--paper);color:var(--ink);
    font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;
    font-size:16px;line-height:1.5;padding:0 0 40px;
  }
  .wrap{max-width:560px;margin:0 auto;padding:18px 16px}
  header.top{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:4px}
  header.top h1{
    font-family:"Songti TC","Noto Serif TC",serif;font-weight:700;
    font-size:22px;margin:0;letter-spacing:.5px;color:var(--olive-deep);
  }
  header.top .sub{font-size:12px;color:var(--muted)}
  .dayrow{display:flex;gap:8px;align-items:center;margin:10px 0 16px}
  .dayrow input{
    flex:1;font-size:16px;padding:9px 12px;border:1px solid var(--line);
    border-radius:10px;background:var(--card);color:var(--ink);font-family:inherit;
  }
  .btn{
    font-family:inherit;font-size:14px;border:1px solid var(--line);background:var(--card);
    color:var(--olive-deep);padding:9px 12px;border-radius:10px;cursor:pointer;font-weight:600;
  }
  .btn:active{transform:translateY(1px)}
  .btn.solid{background:var(--olive);color:#fff;border-color:var(--olive)}
  .btn.ghost{background:transparent}
  .section-label{font-size:12px;letter-spacing:1px;color:var(--muted);font-weight:700;margin:18px 2px 8px;text-transform:none}
  /* paste whole day */
  .pastecard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px}
  .pastecard textarea{width:100%;min-height:118px;resize:vertical;border:1px dashed var(--line);border-radius:10px;background:#FCFAF2;color:var(--ink);font-family:inherit;font-size:15px;line-height:1.7;padding:10px 12px}
  .pastecard textarea::placeholder{color:#B7B197}
  .pastecard textarea:focus{outline:none;border-color:var(--olive)}
  .pastecard .btn.solid{width:100%;margin-top:10px}
  /* meal card */
  .meal{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 12px 6px;margin-bottom:12px;box-shadow:0 1px 0 rgba(85,96,60,.03)}
  .meal .mhead{display:flex;gap:8px;align-items:center;margin-bottom:8px}
  .meal .mname{flex:1;font-size:16px;font-weight:700;color:var(--olive-deep);border:none;background:transparent;font-family:inherit;padding:2px 0;border-bottom:1.5px dashed var(--line)}
  .meal .mname:focus{outline:none;border-bottom-color:var(--olive)}
  .del{border:none;background:transparent;color:var(--muted);font-size:18px;cursor:pointer;padding:2px 6px;line-height:1}
  .quick{width:100%;font-size:14px;padding:7px 10px;border:1px dashed var(--line);border-radius:9px;background:#FCFAF2;color:var(--ink);font-family:inherit;margin-bottom:10px}
  .quick::placeholder{color:#B7B197}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:7px 10px;margin-bottom:6px}
  .cell{display:flex;align-items:center;gap:6px;justify-content:space-between}
  .cell .lab{font-size:13px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .stp{display:flex;align-items:center;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:#fff;flex:none}
  .stp button{width:26px;height:30px;border:none;background:#F4EFE0;color:var(--olive-deep);font-size:16px;cursor:pointer;font-weight:700}
  .stp button:active{background:var(--clay-soft)}
  .stp input{width:38px;height:30px;border:none;text-align:center;font-size:15px;font-family:inherit;color:var(--ink);background:#fff;-moz-appearance:textfield}
  .stp input::-webkit-outer-spin-button,.stp input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .stp input:focus{outline:none;background:#FCFAF2}
  /* behavior */
  .behcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:6px 12px}
  .behrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
  .behrow:last-child{border-bottom:none}
  .behrow .bl{flex:1;font-size:14px}
  .behrow .bl small{color:var(--muted)}
  .behrow input{width:92px;font-size:15px;padding:7px 9px;border:1px solid var(--line);border-radius:9px;text-align:right;font-family:inherit;background:#fff;color:var(--ink)}
  /* receipt */
  .receipt{position:sticky;bottom:0;margin-top:22px;background:var(--olive-deep);color:#F7F3E7;border-radius:16px 16px 0 0;padding:16px 16px 18px;box-shadow:0 -6px 24px rgba(46,42,34,.14)}
  .receipt h2{font-family:"Songti TC","Noto Serif TC",serif;font-size:15px;margin:0 0 10px;font-weight:700;color:#EDE6CE;display:flex;justify-content:space-between;align-items:center}
  .receipt .rlabel{font-weight:400;font-size:12px;opacity:.75}
  .rline{display:flex;align-items:baseline;gap:6px;font-size:13.5px;padding:3px 0;font-variant-numeric:tabular-nums}
  .rline .nm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rline .tg{opacity:.6;font-size:12px}
  .rline .ac{font-weight:700;min-width:38px;text-align:right}
  .rline .dl{font-size:11px;padding:1px 6px;border-radius:20px;min-width:34px;text-align:center}
  .dl.ok{background:rgba(174,196,120,.28);color:#E7F0C9}
  .dl.up{background:rgba(233,222,180,.22);color:#F2E9C6}
  .dl.dn{background:rgba(224,160,90,.28);color:#F6DEBE}
  .rsep{height:1px;background:rgba(247,243,231,.18);margin:8px 0}
  .ract{display:flex;gap:8px;margin-top:12px}
  .ract .btn{flex:1;background:#F7F3E7;border-color:#F7F3E7;color:var(--olive-deep)}
  .ract .btn.sec{background:transparent;color:#F7F3E7;border-color:rgba(247,243,231,.5)}
  .toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(10px);background:var(--ink);color:#F7F3E7;padding:9px 16px;border-radius:20px;font-size:13px;opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  details.tset{margin:6px 0 2px}
  details.tset summary{font-size:13px;color:var(--olive-deep);cursor:pointer;font-weight:600;padding:6px 2px;list-style:none}
  details.tset summary::-webkit-details-marker{display:none}
  details.tset summary::before{content:"⚙ "}
  .tgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px 10px;padding:8px 2px}
  .tgrid label{font-size:13px;display:flex;align-items:center;justify-content:space-between;gap:6px}
  .tgrid input{width:60px;padding:6px 8px;border:1px solid var(--line);border-radius:8px;text-align:right;font-family:inherit;font-size:14px;background:#fff}
  .hint{font-size:11.5px;color:var(--muted);margin:2px 2px 0}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <h1>代換份加總表</h1>
    <span class="sub">BeBetter · 台灣食物代換</span>
  </header>
  <div class="dayrow">
    <input id="dayLabel" value="平常日" aria-label="日期或標籤">
    <button class="btn ghost" id="resetTargets">平常日目標</button>
  </div>
  <details class="tset">
    <summary>每日目標設定（假日可自行改）</summary>
    <div class="tgrid" id="tgrid"></div>
    <div class="hint">份數目標會顯示在下方收據的括號內，並用來算差距。</div>
  </details>
  <div class="section-label">整天貼上（一行一餐，自動拆餐加總）</div>
  <div class="pastecard">
    <textarea id="pasteBox" placeholder="早 1中3🍠1.5🥜&#10;點心 2低1.5🥬1🥜&#10;午 4中3🍠2.5🥬&#10;水果1🍎&#10;晚 3低0.75 🍠2.2🥜"></textarea>
    <button class="btn solid" id="importBtn">拆餐並加總</button>
  </div>
  <div class="section-label">各餐份數（可再手動微調）</div>
  <div id="meals"></div>
  <button class="btn ghost" id="addMeal" style="width:100%;margin-bottom:8px">＋ 新增餐次</button>
  <div class="section-label">行為紀錄</div>
  <div class="behcard" id="behcard"></div>
  <div class="receipt">
    <h2><span id="rTitle">平常日</span><span class="rlabel">目標 ／ 實際</span></h2>
    <div id="receiptLines"></div>
    <div class="ract">
      <button class="btn" id="copyBtn">複製給 LINE</button>
      <button class="btn sec" id="clearBtn">清空數值</button>
    </div>
  </div>
</div>
<div class="toast" id="toast">已複製</div>
<script>
const FOODCATS=[
  {key:'dairy',  emoji:'🥛', name:'乳製品',       full:'乳製品'},
  {key:'veg',    emoji:'🥦', name:'蔬菜類',       full:'蔬菜類'},
  {key:'fruit',  emoji:'🍎', name:'水果類',       full:'水果類'},
  {key:'grain',  emoji:'🍠', name:'全穀根莖類',   full:'全穀根莖類'},
  {key:'lowfat', emoji:'🍗', name:'低脂豆魚蛋肉', full:'低脂豆魚蛋肉類'},
  {key:'medfat', emoji:'🍖', name:'中脂豆魚蛋肉', full:'中脂豆魚蛋肉類'},
  {key:'fat',    emoji:'🥜', name:'堅果油脂',     full:'堅果油脂類'},
  {key:'protein',emoji:'🥛', name:'高蛋白',       full:'高蛋白'},
];
const BEH=[
  {key:'water', emoji:'💧',  name:'水分',  unit:'ml', tkey:'water', suffix:'ml'},
  {key:'steps', emoji:'🚶‍➡️', name:'走路',  unit:'步', tkey:'steps', suffix:'步'},
  {key:'sleep', emoji:'💤',  name:'睡眠',  unit:'小時', tkey:'sleep', suffix:'小時'},
  {key:'poop',  emoji:'✨',  name:'排便',  unit:'次', tkey:'poop', suffix:''},
];
const DEFAULT_TARGETS={dairy:0,veg:4,fruit:2,grain:6,lowfat:7,medfat:4,fat:2,protein:1,
                       water:2500, steps:8000, sleepLabel:'7-8', poop:1};
let targets={...DEFAULT_TARGETS};
let meals=[
  mkMeal('早'), mkMeal('點心'), mkMeal('午'), mkMeal('傍晚'), mkMeal('運動後')
];
let beh={water:'',steps:'',sleep:'',poop:''};
function mkMeal(name){const v={};FOODCATS.forEach(c=>v[c.key]=0);return{id:Math.random().toString(36).slice(2),name,vals:v};}
function fmt(n){if(n===''||n==null)return'';const x=Math.round(parseFloat(n)*100)/100;if(isNaN(x))return'';return Number.isInteger(x)?String(x):String(x);}
/* ---------- shorthand parser: "3低1中2🍠2🥬" ---------- */
const TOKENMAP={'全穀':'grain','水果':'fruit','堅果':'fat','低':'lowfat','中':'medfat','穀':'grain','蔬':'veg','菜':'veg','果':'fruit','油':'fat','乳':'dairy','高':'protein',
  '🍠':'grain','🥬':'veg','🥦':'veg','🍎':'fruit','🥜':'fat','🍗':'lowfat','🍖':'medfat'};
function parseShorthand(str){
  const out={};const re=/(\d+(?:\.\d+)?)\s*(全穀|水果|堅果|低|中|穀|蔬|菜|果|油|乳|高|🍠|🥬|🥦|🍎|🥜|🍗|🍖)/g;
  let m;while((m=re.exec(str))!==null){const k=TOKENMAP[m[2]];if(k)out[k]=(out[k]||0)+parseFloat(m[1]);}
  return out;
}
/* ---------- parse a whole pasted day into meals ---------- */
function parseDayText(text){
  const lines=text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  return lines.map(line=>{
    const idx=line.search(/\d/);
    let name,rest;
    if(idx>0){name=line.slice(0,idx).trim();rest=line.slice(idx);}
    else if(idx===0){name='餐次';rest=line;}
    else{name=line;rest='';}
    const meal=mkMeal(name||'餐次');
    const parsed=parseShorthand(rest);
    Object.keys(parsed).forEach(k=>meal.vals[k]=parsed[k]);
    return meal;
  });
}
/* ---------- render targets panel ---------- */
function renderTargets(){
  const g=document.getElementById('tgrid');g.innerHTML='';
  FOODCATS.forEach(c=>{
    g.insertAdjacentHTML('beforeend',
      `<label>${c.emoji} ${c.name}<input type="number" step="0.5" min="0" data-tkey="${c.key}" value="${targets[c.key]}"></label>`);
  });
  g.insertAdjacentHTML('beforeend',`<label>💧 水分(ml)<input type="number" data-tkey="water" value="${targets.water}"></label>`);
  g.insertAdjacentHTML('beforeend',`<label>🚶 走路(步)<input type="number" data-tkey="steps" value="${targets.steps}"></label>`);
  g.insertAdjacentHTML('beforeend',`<label>💤 睡眠<input type="text" data-tkey="sleepLabel" value="${targets.sleepLabel}"></label>`);
  g.insertAdjacentHTML('beforeend',`<label>✨ 排便(次)<input type="number" data-tkey="poop" value="${targets.poop}"></label>`);
  g.querySelectorAll('input').forEach(inp=>inp.addEventListener('input',e=>{
    const k=e.target.dataset.tkey;targets[k]=(k==='sleepLabel')?e.target.value:(parseFloat(e.target.value)||0);renderReceipt();
  }));
}
/* ---------- render meals ---------- */
function renderMeals(){
  const box=document.getElementById('meals');box.innerHTML='';
  meals.forEach((meal)=>{
    const cells=FOODCATS.map(c=>
      `<div class="cell"><span class="lab">${c.emoji} ${c.name}</span>
        <span class="stp">
          <button data-act="dec" data-m="${meal.id}" data-c="${c.key}">−</button>
          <input type="number" step="0.5" inputmode="decimal" data-m="${meal.id}" data-c="${c.key}" value="${meal.vals[c.key]||0}">
          <button data-act="inc" data-m="${meal.id}" data-c="${c.key}">＋</button>
        </span></div>`).join('');
    box.insertAdjacentHTML('beforeend',
      `<div class="meal" data-m="${meal.id}">
        <div class="mhead">
          <input class="mname" data-m="${meal.id}" value="${meal.name}" aria-label="餐次名稱">
          <button class="del" data-del="${meal.id}" title="刪除">✕</button>
        </div>
        <input class="quick" data-quick="${meal.id}" placeholder="快速輸入：3低1中2🍠2🥬 → Enter 帶入">
        <div class="grid">${cells}</div>
      </div>`);
  });
  bindMealEvents();
}
function bindMealEvents(){
  document.querySelectorAll('.stp button').forEach(b=>b.addEventListener('click',()=>{
    const {act,m,c}=b.dataset;const meal=meals.find(x=>x.id===m);
    let v=meal.vals[c]||0;v=act==='inc'?v+0.5:Math.max(0,v-0.5);meal.vals[c]=Math.round(v*100)/100;
    const inp=document.querySelector(`.stp input[data-m="${m}"][data-c="${c}"]`);inp.value=fmt(meal.vals[c])||0;renderReceipt();
  }));
  document.querySelectorAll('.stp input').forEach(inp=>inp.addEventListener('input',e=>{
    const {m,c}=e.target.dataset;meals.find(x=>x.id===m).vals[c]=parseFloat(e.target.value)||0;renderReceipt();
  }));
  document.querySelectorAll('.mname').forEach(inp=>inp.addEventListener('input',e=>{
    meals.find(x=>x.id===e.target.dataset.m).name=e.target.value;
  }));
  document.querySelectorAll('.del').forEach(b=>b.addEventListener('click',()=>{
    if(meals.length<=1)return;meals=meals.filter(x=>x.id!==b.dataset.del);renderMeals();renderReceipt();
  }));
  document.querySelectorAll('.quick').forEach(inp=>{
    const apply=()=>{const parsed=parseShorthand(inp.value);const meal=meals.find(x=>x.id===inp.dataset.quick);
      Object.keys(parsed).forEach(k=>meal.vals[k]=parsed[k]);inp.value='';renderMeals();renderReceipt();};
    inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();apply();}});
    inp.addEventListener('blur',()=>{if(inp.value.trim())apply();});
  });
}
/* ---------- render behavior ---------- */
function renderBeh(){
  const box=document.getElementById('behcard');box.innerHTML='';
  BEH.forEach(b=>{
    const t=b.key==='sleep'?targets.sleepLabel+' 小時':targets[b.tkey]+' '+(b.suffix||'');
    box.insertAdjacentHTML('beforeend',
      `<div class="behrow"><span class="bl">${b.emoji} ${b.name} <small>(目標 ${t.trim()})</small></span>
        <input type="text" inputmode="decimal" data-beh="${b.key}" value="${beh[b.key]}" placeholder="—"></div>`);
  });
  box.querySelectorAll('input').forEach(inp=>inp.addEventListener('input',e=>{beh[e.target.dataset.beh]=e.target.value;renderReceipt();}));
}
/* ---------- totals + receipt ---------- */
function totals(){const t={};FOODCATS.forEach(c=>t[c.key]=meals.reduce((s,m)=>s+(parseFloat(m.vals[c.key])||0),0));return t;}
function deltaChip(actual,target){
  const d=Math.round((actual-target)*100)/100;
  if(d===0)return`<span class="dl ok">✓</span>`;
  if(d>0)return`<span class="dl up">+${fmt(d)}</span>`;
  return`<span class="dl dn">−${fmt(Math.abs(d))}</span>`;
}
function renderReceipt(){
  const t=totals();const box=document.getElementById('receiptLines');box.innerHTML='';
  document.getElementById('rTitle').textContent=document.getElementById('dayLabel').value||'紀錄';
  FOODCATS.forEach(c=>{
    box.insertAdjacentHTML('beforeend',
      `<div class="rline"><span class="nm">${c.emoji} ${c.full}</span>
        <span class="tg">(${fmt(targets[c.key])}份)</span>
        <span class="ac">${fmt(t[c.key])||0}</span>${deltaChip(t[c.key],targets[c.key])}</div>`);
  });
  box.insertAdjacentHTML('beforeend',`<div class="rsep"></div>`);
  BEH.forEach(b=>{
    const tg=b.key==='sleep'?targets.sleepLabel+'小時':(fmt(targets[b.tkey])+(b.suffix||''));
    const val=beh[b.key]===''?'—':beh[b.key];
    box.insertAdjacentHTML('beforeend',
      `<div class="rline"><span class="nm">${b.emoji} ${b.name}</span>
        <span class="tg">(${tg})</span><span class="ac">${val}</span></div>`);
  });
}
/* ---------- copy text (exact LINE format) ---------- */
function buildCopyText(){
  const t=totals();const lines=[];
  lines.push(document.getElementById('dayLabel').value||'紀錄');
  FOODCATS.forEach(c=>lines.push(`${c.emoji} ${c.full} (${fmt(targets[c.key])}份)：${fmt(t[c.key])||0}`));
  lines.push(`💧 水分 (${fmt(targets.water)}ml)：${beh.water||''}`);
  lines.push(`🚶‍➡️ 走路 (${fmt(targets.steps)}步)：${beh.steps||''}`);
  lines.push(`💤 睡眠 (${targets.sleepLabel}小時)：${beh.sleep||''}`);
  lines.push(`✨排便: ${beh.poop||''}`);
  return lines.join('\n');
}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1400);}
/* ---------- top controls ---------- */
document.getElementById('importBtn').addEventListener('click',()=>{
  const txt=document.getElementById('pasteBox').value;
  const parsed=parseDayText(txt);
  if(parsed.length){meals=parsed;renderMeals();renderReceipt();toast('已拆成 '+parsed.length+' 餐並加總');}
  else{toast('沒抓到內容，檢查格式');}
});
document.getElementById('addMeal').addEventListener('click',()=>{meals.push(mkMeal('餐次'));renderMeals();renderReceipt();});
document.getElementById('dayLabel').addEventListener('input',renderReceipt);
document.getElementById('resetTargets').addEventListener('click',()=>{targets={...DEFAULT_TARGETS};renderTargets();renderBeh();renderReceipt();toast('已套用平常日目標');});
document.getElementById('clearBtn').addEventListener('click',()=>{meals.forEach(m=>FOODCATS.forEach(c=>m.vals[c.key]=0));beh={water:'',steps:'',sleep:'',poop:''};renderMeals();renderBeh();renderReceipt();});
document.getElementById('copyBtn').addEventListener('click',async()=>{
  const txt=buildCopyText();
  try{await navigator.clipboard.writeText(txt);toast('已複製，可貼到 LINE');}
  catch(e){const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();try{document.execCommand('copy');toast('已複製');}catch(_){toast('請長按下方文字複製');}document.body.removeChild(ta);}
});
/* init */
renderTargets();renderMeals();renderBeh();renderReceipt();
</script>
</body>
</html>
